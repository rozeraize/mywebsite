<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Emulator</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #desktop {
            position: relative;
            width: 100%;
            height: calc(100% - 40px);
            background: url('https://source.unsplash.com/random/1920x1080') no-repeat center center;
            background-size: cover;
        }
        #taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: #333;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .window {
            position: absolute;
            width: 300px;
            height: 200px;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        .window-header {
            background: #444;
            color: white;
            padding: 5px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .window-content {
            flex: 1;
            padding: 10px;
        }
        .close-btn {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="desktop"></div>
    <div id="taskbar">
        <button onclick="openWindow('App 1')">App 1</button>
        <button onclick="openWindow('App 2')">App 2</button>
    </div>

    <script>
        let zIndex = 1;

        function openWindow(title) {
            const windowDiv = document.createElement('div');
            windowDiv.className = 'window';
            windowDiv.style.zIndex = zIndex++;
            windowDiv.innerHTML = `
                <div class="window-header">
                    <span>${title}</span>
                    <span class="close-btn" onclick="closeWindow(this)">x</span>
                </div>
                <div class="window-content">
                    <p>Content for ${title}</p>
                </div>
            `;
            document.getElementById('desktop').appendChild(windowDiv);

            makeDraggable(windowDiv);
        }

        function closeWindow(closeBtn) {
            const windowDiv = closeBtn.parentElement.parentElement;
            windowDiv.remove();
        }

        function makeDraggable(element) {
            let isDragging = false;
            let offsetX, offsetY;

            const header = element.querySelector('.window-header');
            header.addEventListener('mousedown', (e) => {
                isDragging = true;
                offsetX = e.clientX - element.offsetLeft;
                offsetY = e.clientY - element.offsetTop;
                header.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    element.style.left = `${e.clientX - offsetX}px`;
                    element.style.top = `${e.clientY - offsetY}px`;
                }
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                header.style.cursor = 'move';
            });
        }
    </script>
</body>
</html>
