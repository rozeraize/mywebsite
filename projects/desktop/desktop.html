<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Desktop OS</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #desktop {
            position: relative;
            width: 100%;
            height: calc(100% - 40px);
            background: url('https://source.unsplash.com/random/1920x1080') no-repeat center center;
            background-size: cover;
        }
        #taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: #333;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
        }
        #taskbar button {
            margin-right: 10px;
            background: #444;
            border: none;
            color: white;
            padding: 5px 10px;
            cursor: pointer;
        }
        #open-programs {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .window {
            position: absolute;
            width: 400px;
            height: 300px;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            resize: both;
            overflow: hidden;
        }
        .window-header {
            background: #444;
            color: white;
            padding: 5px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .window-content {
            flex: 1;
            padding: 10px;
            overflow: auto;
        }
        .window-header button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }
        #notepad, #file-explorer, #minesweeper, #command-line, #html-viewer {
            display: none;
        }
        #command-line input {
            width: 100%;
            background: none;
            border: none;
            color: #0f0;
            outline: none;
            font-family: inherit;
            font-size: inherit;
        }
        #command-line {
            background-color: #000;
            color: #0f0;
        }
        .file {
            margin: 5px 0;
            cursor: pointer;
        }
        #program-launcher {
            position: absolute;
            bottom: 40px;
            left: 10px;
            width: 200px;
            background: #444;
            color: white;
            padding: 10px;
            display: none;
            flex-direction: column;
        }
        #program-launcher button {
            margin-bottom: 10px;
            background: #555;
            border: none;
            color: white;
            padding: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="desktop">
        <div id="notepad" class="window">
            <div class="window-header">
                Notepad 
                <div>
                    <button onclick="minimizeWindow(this)">_</button>
                    <button onclick="maximizeWindow(this)">[]</button>
                    <button class="close-btn" onclick="closeWindow(this)">x</button>
                </div>
            </div>
            <div class="window-content">
                <textarea id="notepad-content" style="width: 100%; height: 100%;"></textarea>
                <button onclick="saveTextFile()">Save</button>
            </div>
        </div>
        <div id="file-explorer" class="window">
            <div class="window-header">
                File Explorer 
                <div>
                    <button onclick="minimizeWindow(this)">_</button>
                    <button onclick="maximizeWindow(this)">[]</button>
                    <button class="close-btn" onclick="closeWindow(this)">x</button>
                </div>
            </div>
            <div class="window-content" id="file-list">
                <!-- Files will be listed here -->
            </div>
        </div>
        <div id="minesweeper" class="window">
            <div class="window-header">
                Minesweeper 
                <div>
                    <button onclick="minimizeWindow(this)">_</button>
                    <button onclick="maximizeWindow(this)">[]</button>
                    <button class="close-btn" onclick="closeWindow(this)">x</button>
                </div>
            </div>
            <div class="window-content">
                <div id="minesweeper-grid"></div>
            </div>
        </div>
        <div id="command-line" class="window">
            <div class="window-header">
                Command Line 
                <div>
                    <button onclick="minimizeWindow(this)">_</button>
                    <button onclick="maximizeWindow(this)">[]</button>
                    <button class="close-btn" onclick="closeWindow(this)">x</button>
                </div>
            </div>
            <div class="window-content">
                <div>Welcome to the command line</div>
                <div id="output"></div>
                <div>$ <input type="text" id="cmd-input" autofocus></div>
            </div>
        </div>
        <div id="html-viewer" class="window">
            <div class="window-header">
                HTML Viewer 
                <div>
                    <button onclick="minimizeWindow(this)">_</button>
                    <button onclick="maximizeWindow(this)">[]</button>
                    <button class="close-btn" onclick="closeWindow(this)">x</button>
                </div>
            </div>
            <div class="window-content">
                <iframe id="html-viewer-content" style="width: 100%; height: 100%;"></iframe>
            </div>
        </div>
    </div>
    <div id="taskbar">
        <button onclick="toggleProgramLauncher()">Start</button>
        <div id="open-programs"></div>
    </div>
    <div id="program-launcher">
        <button onclick="openWindow('notepad')">Notepad</button>
        <button onclick="openWindow('file-explorer')">File Explorer</button>
        <button onclick="openWindow('minesweeper')">Minesweeper</button>
        <button onclick="openWindow('command-line')">Command Line</button>
        <button onclick="openWindow('html-viewer')">HTML Viewer</button>
    </div>

    <script>
        let zIndex = 1;
        let files = {};

        function toggleProgramLauncher() {
            const launcher = document.getElementById('program-launcher');
            launcher.style.display = launcher.style.display === 'flex' ? 'none' : 'flex';
        }

        function openWindow(id) {
            const windowDiv = document.getElementById(id);
            windowDiv.style.display = 'block';
            windowDiv.style.zIndex = zIndex++;
            windowDiv.style.top = '50px';
            windowDiv.style.left = '50px';

            makeDraggable(windowDiv);
            updateTaskbar(id, true);
        }

        function closeWindow(closeBtn) {
            const windowDiv = closeBtn.parentElement.parentElement.parentElement;
            windowDiv.style.display = 'none';
            updateTaskbar(windowDiv.id, false);
        }

        function minimizeWindow(minBtn) {
            const windowDiv = minBtn.parentElement.parentElement.parentElement;
            windowDiv.style.display = 'none';
        }

        function maximizeWindow(maxBtn) {
            const windowDiv = maxBtn.parentElement.parentElement.parentElement;
            if (windowDiv.style.width === '100%' && windowDiv.style.height === 'calc(100% - 40px)') {
                windowDiv.style.width = '400px';
                windowDiv.style.height = '300px';
            } else {
                windowDiv.style.width = '100%';
                windowDiv.style.height = 'calc(100% - 40px)';
            }
            windowDiv.style.top = '0';
            windowDiv.style.left = '0';
        }

        function makeDraggable(element) {
            let isDragging = false;
            let offsetX, offsetY;

            const header = element.querySelector('.window-header');
            header.addEventListener('mousedown', (e) => {
                isDragging = true;
                offsetX = e.clientX - element.offsetLeft;
                offsetY = e.clientY - element.offsetTop;
                header.style.cursor = 'grabbing';
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    element.style.left = `${e.clientX - offsetX}px`;
                    element.style.top = `${e.clientY - offsetY}px`;
                }
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                header.style.cursor = 'move';
            });
        }

        function updateTaskbar(id, add) {
            const taskbar = document.getElementById('open-programs');
            if (add) {
                const button = document.createElement('button');
                button.textContent = id.replace('-', ' ');
                button.onclick = () => document.getElementById(id).style.display = 'block';
                button.id = `taskbar-${id}`;
                taskbar.appendChild(button);
            } else {
                const button = document.getElementById(`taskbar-${id}`);
                if (button) {
                    taskbar.removeChild(button);
                }
            }
        }

        // Notepad
        function saveTextFile() {
            const content = document.getElementById('notepad-content').value;
            const filename = prompt('Enter filename', 'untitled.txt');
            if (filename) {
                files[filename] = content;
                alert('File saved');
                updateFileList();
            }
        }

        function updateFileList() {
            const fileList = document.getElementById('file-list');
            fileList.innerHTML = '';
            for (const filename in files) {
                const fileDiv = document.createElement('div');
                fileDiv.className = 'file';
                fileDiv.textContent = filename;
                fileDiv.onclick = () => openTextFile(filename);
                fileList.appendChild(fileDiv);
            }
        }

        function openTextFile(filename) {
            const content = files[filename];
            openWindow('notepad');
            document.getElementById('notepad-content').value = content;
        }

        // Simple Minesweeper
        const minesweeperGrid = document.getElementById('minesweeper-grid');
        const gridSize = 8;
        const mineCount = 10;
        let mines = [];

        function initMinesweeper() {
            minesweeperGrid.innerHTML = '';
            minesweeperGrid.style.display = 'grid';
            minesweeperGrid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            minesweeperGrid.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;

            mines = Array(gridSize * gridSize).fill(0);
            for (let i = 0; i < mineCount; i++) {
                let index;
                do {
                    index = Math.floor(Math.random() * gridSize * gridSize);
                } while (mines[index] === 1);
                mines[index] = 1;
            }

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.style.border = '1px solid #ccc';
                cell.style.width = '30px';
                cell.style.height = '30px';
                cell.style.display = 'flex';
                cell.style.alignItems = 'center';
                cell.style.justifyContent = 'center';
                cell.style.cursor = 'pointer';
                cell.addEventListener('click', () => revealCell(i));
                minesweeperGrid.appendChild(cell);
            }
        }

        function revealCell(index) {
            const cell = minesweeperGrid.children[index];
            if (mines[index] === 1) {
                cell.style.backgroundColor = 'red';
                cell.innerHTML = 'X';
                alert('Game Over!');
                initMinesweeper();
            } else {
                cell.style.backgroundColor = 'lightgray';
                cell.innerHTML = '';
            }
        }

        initMinesweeper();

        // Command Line
        const cmdInput = document.getElementById('cmd-input');
        const output = document.getElementById('output');

        const commands = {
            help: 'Available commands: help, clear, echo, ls, cat',
            clear: '',
            echo: (args) => args.join(' '),
            ls: () => Object.keys(files).join('\n'),
            cat: (args) => files[args[0]] || `File not found: ${args[0]}`
        };

        cmdInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                const commandLine = cmdInput.value.trim();
                const [command, ...args] = commandLine.split(' ');
                const result = commands[command] !== undefined 
                    ? (typeof commands[command] === 'function' ? commands[command](args) : commands[command])
                    : `Command not found: ${command}`;

                if (command === 'clear') {
                    output.innerHTML = '';
                } else {
                    output.innerHTML += `$ ${commandLine}\n${result}\n`;
                }

                cmdInput.value = '';
                document.getElementById('command-line').scrollTop = document.getElementById('command-line').scrollHeight;
            }
        });

        // HTML Viewer
        function openHTMLFile(filename) {
            const content = files[filename];
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            openWindow('html-viewer');
            document.getElementById('html-viewer-content').src = url;
        }

    </script>
</body>
</html>
